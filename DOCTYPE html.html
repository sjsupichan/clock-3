<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Clock + Gemini AI</title>
    <style>
        /* CSS reset to ensure visibility even if Tailwind fails */
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --accent-color: #38bdf8;
            --text-main: #f8fafc;
        }

        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a) !important;
            background-color: #0f172a !important;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 1rem;
            overflow-x: hidden;
        }

        #loading-overlay {
            position: fixed;
            inset: 0;
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.5s ease;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            width: 100%;
            max-width: 32rem;
            padding: 2rem;
            display: none; /* Controlled by JS */
            flex-direction: column;
            align-items: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .clock-face {
            width: 240px;
            height: 240px;
            border-radius: 50%;
            border: 8px solid rgba(255, 255, 255, 0.05);
            position: relative;
            background: rgba(15, 23, 42, 0.5);
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            border-radius: 10px;
        }

        .hour-hand { width: 6px; height: 60px; background: #f8fafc; margin-left: -3px; z-index: 3; }
        .min-hand { width: 4px; height: 85px; background: #94a3b8; margin-left: -2px; z-index: 2; }
        .sec-hand { width: 2px; height: 95px; background: var(--accent-color); margin-left: -1px; z-index: 4; }

        .center-dot {
            position: absolute;
            top: 50%; left: 50%;
            width: 12px; height: 12px;
            background: var(--accent-color);
            border: 2px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .marker {
            position: absolute;
            width: 2px; height: 8px;
            background: rgba(255,255,255,0.2);
            left: 50%;
            transform-origin: 0 120px;
        }

        .tab-content { display: none; width: 100%; }
        .tab-content.active { display: flex; animation: fadeIn 0.4s ease-out; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0) 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div style="color: #38bdf8; font-family: sans-serif; font-weight: bold;">Initializing...</div>
    </div>

    <div id="app-container" class="glass-panel">
        <!-- Navigation Tabs -->
        <div class="flex bg-slate-900/50 p-1 rounded-2xl mb-6 w-full">
            <button id="clock-tab-btn" onclick="showTab('clock')" class="flex-1 py-2 rounded-xl text-sm font-medium transition-all bg-sky-500 text-white">Clock</button>
            <button id="stopwatch-tab-btn" onclick="showTab('stopwatch')" class="flex-1 py-2 rounded-xl text-sm font-medium transition-all text-slate-400 hover:text-white">Stopwatch</button>
            <button id="ai-tab-btn" onclick="showTab('ai')" class="flex-1 py-2 rounded-xl text-sm font-medium transition-all text-slate-400 hover:text-white">✨ AI Plan</button>
        </div>

        <!-- Clock Tab -->
        <div id="clock-tab" class="tab-content active flex-col items-center">
            <div class="clock-face mb-6">
                <div id="markers-container"></div>
                <div class="hand hour-hand" id="hour-hand"></div>
                <div class="hand min-hand" id="min-hand"></div>
                <div class="hand sec-hand" id="sec-hand"></div>
                <div class="center-dot"></div>
            </div>

            <div class="text-center w-full">
                <h1 id="digital-time" class="text-5xl font-bold tracking-tight mb-2">00:00:00</h1>
                <p id="current-date" class="text-sky-400 font-medium uppercase tracking-widest text-xs mb-6">Updating...</p>
                
                <div id="quote-box" class="mt-4 p-4 rounded-2xl bg-slate-900/40 border border-white/5 italic text-slate-300 text-sm min-h-[60px] flex items-center justify-center relative group">
                    <span id="quote-text">Time is what we want most, but what we use worst.</span>
                    <button onclick="generateAIQuote()" class="absolute -top-3 -right-3 bg-sky-500 p-2 rounded-full shadow-lg opacity-0 group-hover:opacity-100 transition-opacity">
                        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Stopwatch Tab -->
        <div id="stopwatch-tab" class="tab-content flex-col items-center">
            <div class="text-center mb-8">
                <div id="sw-display" class="text-6xl font-mono font-light tracking-tighter mb-2">00:00.00</div>
                <p class="text-slate-500 text-xs uppercase tracking-widest">Elapsed Time</p>
            </div>
            <div class="flex gap-4 mb-8 w-full">
                <button id="sw-start-btn" onclick="toggleStopwatch()" class="flex-[2] py-4 bg-sky-500 text-white rounded-2xl font-bold">START</button>
                <button id="sw-lap-btn" onclick="recordLap()" class="flex-1 py-4 bg-slate-800 text-white rounded-2xl font-bold opacity-50" disabled>LAP</button>
                <button id="sw-reset-btn" onclick="resetStopwatch()" class="flex-1 py-4 bg-slate-800 text-red-400 rounded-2xl font-bold">RESET</button>
            </div>
            <div class="w-full bg-slate-900/30 rounded-2xl p-4 h-48 overflow-y-auto" id="laps-container">
                <div class="text-slate-500 text-center text-sm mt-12">No laps recorded</div>
            </div>
        </div>

        <!-- AI Plan Tab -->
        <div id="ai-tab" class="tab-content flex-col">
            <h2 class="text-xl font-bold mb-2">✨ Smart Day Planner</h2>
            <textarea id="ai-input" class="w-full h-24 bg-slate-900/50 rounded-xl p-3 text-sm border border-white/10 text-white outline-none mb-4" placeholder="e.g. Gym at 8am, lunch at 12..."></textarea>
            <button id="ai-plan-btn" onclick="generateSchedule()" class="w-full py-3 bg-sky-600 rounded-xl font-bold text-sm mb-6">GENERATE ✨</button>
            <div id="ai-result" class="w-full bg-slate-900/50 rounded-2xl p-4 min-h-[100px] hidden"></div>
        </div>
    </div>

    <!-- Tailwind Loaded last -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        const apiKey = ""; 

        // USE DOMContentLoaded as it is more reliable than window.onload
        document.addEventListener('DOMContentLoaded', () => {
            initClockMarkers();
            updateClock();
            setInterval(updateClock, 1000);
            
            // Immediately show app and hide loader
            const loader = document.getElementById('loading-overlay');
            const app = document.getElementById('app-container');
            
            if (loader) loader.style.display = 'none';
            if (app) app.style.display = 'flex';
        });

        const hourHand = document.getElementById('hour-hand');
        const minHand = document.getElementById('min-hand');
        const secHand = document.getElementById('sec-hand');
        const digitalDisplay = document.getElementById('digital-time');
        const dateDisplay = document.getElementById('current-date');

        function initClockMarkers() {
            const markersContainer = document.getElementById('markers-container');
            if (!markersContainer) return;
            markersContainer.innerHTML = '';
            for (let i = 0; i < 12; i++) {
                const marker = document.createElement('div');
                marker.className = 'marker';
                marker.style.transform = `translateX(-50%) rotate(${i * 30}deg)`;
                if (i % 3 === 0) {
                    marker.style.height = '14px';
                    marker.style.background = 'rgba(255,255,255,0.5)';
                }
                markersContainer.appendChild(marker);
            }
        }

        function updateClock() {
            const now = new Date();
            const seconds = now.getSeconds();
            const minutes = now.getMinutes();
            const hours = now.getHours();

            const secDeg = (seconds / 60) * 360;
            const minDeg = (minutes / 60) * 360 + (seconds / 60) * 6;
            const hourDeg = (hours / 12) * 360 + (minutes / 60) * 30;

            if(secHand) secHand.style.transform = `translateX(-50%) rotate(${secDeg}deg)`;
            if(minHand) minHand.style.transform = `translateX(-50%) rotate(${minDeg}deg)`;
            if(hourHand) hourHand.style.transform = `translateX(-50%) rotate(${hourDeg}deg)`;

            if(digitalDisplay) digitalDisplay.textContent = now.toLocaleTimeString('en-GB', { hour12: false });
            if(dateDisplay) dateDisplay.textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
        }

        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            const target = document.getElementById(`${tabName}-tab`);
            if (target) target.classList.add('active');

            const btns = ['clock', 'stopwatch', 'ai'];
            btns.forEach(b => {
                const btn = document.getElementById(`${b}-tab-btn`);
                if (btn) {
                    btn.className = b === tabName 
                        ? "flex-1 py-2 rounded-xl text-sm font-medium transition-all bg-sky-500 text-white"
                        : "flex-1 py-2 rounded-xl text-sm font-medium transition-all text-slate-400 hover:text-white";
                }
            });
        }

        let swStartTime, swElapsedTime = 0, swInterval, isRunning = false, laps = [];
        function formatTime(ms) {
            const m = Math.floor(ms / 60000).toString().padStart(2, '0');
            const s = Math.floor((ms % 60000) / 1000).toString().padStart(2, '0');
            const c = Math.floor((ms % 1000) / 10).toString().padStart(2, '0');
            return `${m}:${s}.${c}`;
        }

        function toggleStopwatch() {
            const btn = document.getElementById('sw-start-btn');
            const lapBtn = document.getElementById('sw-lap-btn');
            if (!isRunning) {
                isRunning = true;
                swStartTime = Date.now() - swElapsedTime;
                swInterval = setInterval(() => {
                    swElapsedTime = Date.now() - swStartTime;
                    document.getElementById('sw-display').textContent = formatTime(swElapsedTime);
                }, 10);
                btn.textContent = 'STOP';
                btn.style.backgroundColor = '#f97316';
                lapBtn.disabled = false;
                lapBtn.classList.remove('opacity-50');
            } else {
                isRunning = false;
                clearInterval(swInterval);
                btn.textContent = 'RESUME';
                btn.style.backgroundColor = '#0ea5e9';
                lapBtn.disabled = true;
                lapBtn.classList.add('opacity-50');
            }
        }

        function resetStopwatch() {
            isRunning = false; clearInterval(swInterval); swElapsedTime = 0;
            document.getElementById('sw-display').textContent = '00:00.00';
            document.getElementById('sw-start-btn').textContent = 'START';
            document.getElementById('sw-start-btn').style.backgroundColor = '#0ea5e9';
            laps = [];
            document.getElementById('laps-container').innerHTML = '<div class="text-slate-500 text-center text-sm mt-12">No laps recorded</div>';
        }

        function recordLap() {
            if (isRunning) {
                laps.unshift(swElapsedTime);
                document.getElementById('laps-container').innerHTML = laps.map((l, i) => `
                    <div class="flex justify-between py-2 border-b border-white/5">
                        <span class="text-slate-500 text-xs">LAP ${laps.length - i}</span>
                        <span class="text-white font-mono">${formatTime(l)}</span>
                    </div>
                `).join('');
            }
        }

        async function callGemini(prompt) {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await res.json();
            return data.candidates[0].content.parts[0].text;
        }

        async function generateAIQuote() {
            const qt = document.getElementById('quote-text');
            qt.textContent = "Summoning wisdom...";
            try {
                const q = await callGemini("Short motivational quote about time. 10 words max.");
                qt.textContent = q.replace(/"/g, '');
            } catch (e) { qt.textContent = "Carpe Diem."; }
        }

        async function generateSchedule() {
            const input = document.getElementById('ai-input').value;
            if (!input) return;
            const resBox = document.getElementById('ai-result');
            resBox.classList.remove('hidden');
            resBox.innerHTML = '<div class="shimmer h-12 w-full rounded"></div>';
            try {
                const plan = await callGemini(`Organize this schedule into a list: ${input}`);
                resBox.innerHTML = `<div class="text-xs text-slate-300 whitespace-pre-wrap">${plan}</div>`;
            } catch (e) { resBox.innerHTML = "Error connecting to AI."; }
        }
    </script>
</body>
</html>
